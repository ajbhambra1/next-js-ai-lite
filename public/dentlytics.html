<style>
  html, body { background:#0A0B0D; color:#F5F6F7; }

  ::selection { background:#00E5A0; color:#0A0B0D; }

  input[type="text"], input[type="email"], input[type="tel"], textarea {

  <script type="text/babel" data-presets="react">
// Hero dashboard — radial gauge + 5-day bars infographic.
// Cycles through three live metrics (Decon time, Reception wait, Efficiency score)
// with a smooth crossfade. All CSS/SVG, no video file.
const { useState, useEffect, useRef } = React;

// ---------- helpers ----------
function pad(n, w = 2) {
  const s = String(Math.floor(n));
  return s.length >= w ? s : '0'.repeat(w - s.length) + s;
}
function minsToMMSS(mins) {
  const m = Math.floor(mins);
  const s = Math.round((mins - m) * 60);
  return `${pad(m)}:${pad(s)}`;
}

// ---------- shared bits ----------
function GridBackdrop({ id }) {
  return (
    <svg className="absolute inset-0 w-full h-full opacity-40 pointer-events-none" viewBox="0 0 400 400" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <pattern id={id} width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1F2227" strokeWidth="0.5" />
        </pattern>
      </defs>
      <rect width="400" height="400" fill={`url(#${id})`} />
    </svg>
  );
}

// Circular gauge — fills `pct` (0..1) of the arc with the accent colour.
function RadialGauge({ pct, label, primary, sub, size = 200, color = '#00E5A0' }) {
  const stroke = 12;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const dash = c * Math.max(0, Math.min(1, pct));
  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-hidden="true">
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#1F2227" strokeWidth={stroke} />
        <circle
          cx={size / 2}
          cy={size / 2}
          r={r}
          fill="none"
          stroke={color}
          strokeWidth={stroke}
          strokeLinecap="round"
          strokeDasharray={`${dash} ${c - dash}`}
          strokeDashoffset={c / 4}
          transform={`rotate(-90 ${size / 2} ${size / 2})`}
          style={{ transition: 'stroke-dasharray 900ms cubic-bezier(0.16, 1, 0.3, 1)' }}
        />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-3 leading-tight">
        <div className="label-mono text-[10px] text-mute mb-2 whitespace-nowrap">{label}</div>
        <div className="font-mono text-ink h-tight leading-none" style={{ fontSize: 34 }}>{primary}</div>
        {sub && <div className="label-mono text-[10px] text-mute mt-2.5 whitespace-nowrap">{sub}</div>}
      </div>
    </div>
  );
}

// 5-day bar chart — last bar is today, highlighted.
function FiveDayBars({ values, target, format, color = '#00E5A0', lowerIsBetter = true, days = ['THU', 'FRI', 'SAT', 'SUN', 'MON'] }) {
  const max = Math.max(...values, target ?? 0) * 1.18;
  const avg = values.reduce((a, b) => a + b, 0) / values.length;
  return (
    <div className="w-full">
      <div className="flex items-baseline justify-between mb-3">
        <span className="label-mono text-[10px] text-mute">LAST 5 DAYS</span>
        <span className="label-mono text-[10px] text-mute">AVG {format ? format(avg) : avg.toFixed(0)}</span>
      </div>
      <div className="relative h-[100px]">
        <div
          className="absolute left-0 right-0 border-t border-dashed border-[#3A3F47]"
          style={{ bottom: `${(avg / max) * 100}%` }}
        />
        <div className="absolute inset-0 flex items-end gap-2.5">
          {values.map((v, i) => {
            const isToday = i === values.length - 1;
            const good = target == null ? true : lowerIsBetter ? v <= target : v >= target;
            const bad = target == null ? false : lowerIsBetter ? v > target * 1.1 : v < target * 0.9;
            const fill = isToday ? color : bad ? '#FF5C5C' : good ? '#2F8F6E' : '#3A3F47';
            return (
              <div key={i} className="flex-1 flex flex-col items-center gap-1.5">
                <span className="label-mono text-[9px]" style={{ color: isToday ? color : '#5C616A' }}>
                  {format ? format(v) : v}
                </span>
                <div
                  className="w-full"
                  style={{
                    height: `${(v / max) * 78}px`,
                    background: fill,
                    opacity: isToday ? 1 : 0.85,
                  }}
                />
              </div>
            );
          })}
        </div>
      </div>
      <div className="flex items-center gap-2.5 mt-2.5">
        {days.map((d, i) => (
          <div
            key={d + i}
            className="flex-1 text-center label-mono text-[9px]"
            style={{ color: i === days.length - 1 ? color : '#5C616A' }}
          >
            {d}
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------- three metric views ----------
function DeconView({ tick }) {
  const wobble = Math.sin(tick / 1400) * 0.03;
  const today = 8.9 + wobble;
  const series = [9.4, 9.2, 8.7, 9.1, today];
  const target = 9.0;
  const pct = Math.max(0, Math.min(1, 1 - (today - target) / target + 0.5));
  return (
    <MetricLayout
      gauge={<RadialGauge pct={pct} label="TIME IN DECON" primary={minsToMMSS(today)} sub={`TARGET ${minsToMMSS(target)}`} />}
      bars={<FiveDayBars values={series} target={target} format={minsToMMSS} />}
      headline="DECON TURNAROUND"
      headlineMeta="ZONE A → ZONE B"
    />
  );
}

function ReceptionView({ tick }) {
  const wobble = Math.sin(tick / 1700) * 0.04;
  const today = 12.1 + wobble;
  const series = [14.4, 13.8, 12.6, 13.2, today];
  const target = 12.0;
  const pct = Math.max(0, Math.min(1, 1 - (today - target) / (target * 0.6)));
  return (
    <MetricLayout
      gauge={<RadialGauge pct={pct} label="RECEPTION WAIT" primary={minsToMMSS(today)} sub={`TARGET ${minsToMMSS(target)}`} />}
      bars={<FiveDayBars values={series} target={target} format={minsToMMSS} />}
      headline="AVG PATIENT WAIT"
      headlineMeta="ALL CAMERAS · TODAY"
    />
  );
}

function EfficiencyView({ tick }) {
  const wobble = Math.sin(tick / 1900) * 0.4;
  const today = 84 + wobble;
  const series = [76, 78, 81, 79, today];
  const target = 80;
  const pct = today / 100;
  return (
    <MetricLayout
      gauge={<RadialGauge pct={pct} label="EFFICIENCY SCORE" primary={`${Math.round(today)}%`} sub={`TARGET ${target}%`} />}
      bars={<FiveDayBars values={series} target={target} format={(v) => `${Math.round(v)}%`} lowerIsBetter={false} />}
      headline="OVERALL EFFICIENCY"
      headlineMeta="DECON + FLOW + COVERAGE"
    />
  );
}

// ---------- shared layout inside the device frame ----------
function MetricLayout({ gauge, bars, headline, headlineMeta }) {
  return (
    <div className="absolute inset-0 p-7 lg:p-9 flex flex-col">
      <GridBackdrop id={`bg-${headline.replace(/\s+/g, '-').toLowerCase()}`} />

      <div className="relative flex items-start justify-between mb-3">
        <div>
          <div className="label-mono text-[10px] text-mute mb-1">METRIC</div>
          <div className="text-ink text-[15px] h-tight font-semibold">{headline}</div>
        </div>
        <div className="text-right">
          <div className="label-mono text-[10px] text-mute mb-1">SCOPE</div>
          <div className="label-mono text-[10px] text-ink/85">{headlineMeta}</div>
        </div>
      </div>

      <div className="relative flex-1 grid grid-cols-1 sm:grid-cols-[auto_1px_1fr] items-center gap-6 sm:gap-10">
        <div className="flex items-center justify-center">{gauge}</div>
        <div className="hidden sm:block w-px h-[60%] bg-hairline" />
        <div className="flex flex-col justify-center">{bars}</div>
      </div>
    </div>
  );
}

// ---------- scan line ----------
function ScanLine({ active }) {
  if (!active) return null;
  return (
    <div className="absolute inset-0 pointer-events-none z-30 overflow-hidden">
      <div
        className="absolute left-0 right-0 h-24"
        style={{
          animation: 'scan 600ms ease-in-out forwards',
          background: 'linear-gradient(to bottom, rgba(0,229,160,0) 0%, rgba(0,229,160,0.18) 50%, rgba(0,229,160,0) 100%)',
        }}
      />
    </div>
  );
}

// ---------- main ----------
function HeroDashboard() {
  const [tick, setTick] = useState(0);
  const [viewIdx, setViewIdx] = useState(0);
  const [scanning, setScanning] = useState(false);
  const prefersReduced = useRef(false);

  useEffect(() => {
    prefersReduced.current = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }, []);

  useEffect(() => {
    const id = setInterval(() => setTick((t) => t + 100), 100);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (prefersReduced.current) return;
    const id = setInterval(() => {
      setScanning(true);
      setTimeout(() => setViewIdx((i) => (i + 1) % 3), 200);
      setTimeout(() => setScanning(false), 700);
    }, 6500);
    return () => clearInterval(id);
  }, []);

  const views = [
    <EfficiencyView tick={tick} key="e" />,
    <DeconView tick={tick} key="d" />,
    <ReceptionView tick={tick} key="r" />,
  ];

  const pipLabels = ['EFFICIENCY SCORE', 'DECON', 'RECEPTION'];

  return (
    <div
      role="img"
      aria-label="Animated preview of Dentlytics dashboard cycling through decon time, reception wait and efficiency score"
      className="relative w-full aspect-[8/5] rounded-3xl overflow-hidden bg-[#0B0D10] border border-mint/20"
      style={{ boxShadow: '0 0 0 1px rgba(0,229,160,0.08), 0 0 80px -20px rgba(0,229,160,0.15), inset 0 0 60px -20px rgba(0,229,160,0.06)' }}
    >
      <div className="absolute top-0 left-0 right-0 h-8 z-20 flex items-center justify-between px-4 border-b border-hairline bg-[#0E1013]/60 backdrop-blur-sm">
        <div className="flex items-center gap-2">
          <span className="w-1.5 h-1.5 rounded-full bg-mint mint-pulse" />
          <span className="label-mono text-[9px] text-ink/85">DENTLYTICS · LIVE OPS</span>
        </div>
        <div className="flex items-center gap-4">
          <span className="label-mono text-[9px] text-mute hidden md:inline">BLOOM DENTAL · LONDON</span>
          <span className="label-mono text-[9px] text-mute">SYNC 00:00:02 AGO</span>
        </div>
      </div>

      <div className="absolute top-8 left-0 right-0 z-20 flex items-center justify-center gap-2 sm:gap-3 px-4 py-2.5 border-b border-hairline bg-[#0E1013]/40">
        {[0, 1, 2].map((i) => {
          const active = i === viewIdx;
          return (
            <button
              key={i}
              type="button"
              onClick={() => setViewIdx(i)}
              aria-pressed={active}
              aria-label={`Show ${pipLabels[i]} metric`}
              className="label-mono text-[10px] sm:text-[11px] rounded-md transition-all duration-200 px-3 sm:px-4 py-2 border"
              style={{
                background: active ? '#00E5A0' : 'transparent',
                borderColor: active ? '#00E5A0' : 'rgba(0,229,160,0.45)',
                color: active ? '#0A0B0D' : '#F5F6F7',
              }}
            >
              {pipLabels[i]}
            </button>
          );
        })}
      </div>

      <div className="absolute top-[72px] left-0 right-0 bottom-0">
        {views.map((v, i) => (
          <div
            key={i}
            className="absolute inset-0 transition-opacity duration-[600ms]"
            style={{ opacity: i === viewIdx ? 1 : 0, pointerEvents: i === viewIdx ? 'auto' : 'none' }}
          >
            {v}
          </div>
        ))}
        <ScanLine active={scanning} />
      </div>
    </div>
  );
}

window.HeroDashboard = HeroDashboard;
  </script>

  <script type="text/babel" data-presets="react">
// Survey form — local state, replaces with confirmation on submit.
const { useState: useStateS } = React;

const SURVEY_OPTIONS = [
'Patient waiting time in the waiting room',
'Number of patient waiting at any given time',
'Decontamination room turnaround time',
'Whether reception is consistently staffed during opening hours',
'Duration and frequency of calls taken by reception',
'Time from patient arrival to first contact with reception',
'Time from patient finishing appointment to contact and payment with reception',
'Average appointment time overrun by clinician',
'Per-staff-member daily activity summaries',
'Visible patient anxiety in the waiting area before treatment',
'Footfall patterns by hour/daily/weekly',
'Daily evidence I could show CQC during an inspection',
'Side-by-side comparison across my different practices (multi-site owners only)'];


const PRACTICES_OPTIONS = ['1', '2–3', '4–9', '10+'];

const COST_OPTIONS = [
'Under £500',
'£500 – £2,000',
'£2,000 – £5,000',
'£5,000+'];


function CheckIcon() {
  return (
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
      <path d="M2 5.5 L4.5 8 L9 3" stroke="#0A0B0D" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
    </svg>);

}

function Checkbox({ checked, onChange, label }) {
  return (
    <label className="flex items-start gap-3 py-2.5 cursor-pointer group">
      <span className={`check-box mt-0.5 ${checked ? 'checked' : ''}`}>
        <CheckIcon />
      </span>
      <input
        type="checkbox"
        checked={checked}
        onChange={(e) => onChange(e.target.checked)}
        className="sr-only"
        aria-label={label} />

      <span className="text-[15px] text-ink/90 leading-snug group-hover:text-ink transition-colors">{label}</span>
    </label>);

}

function RadioRow({ active, onClick, label }) {
  return (
    <button
      type="button"
      onClick={onClick}
      data-active={active}
      className="radio-row w-full text-left px-4 py-3.5 border hairline flex items-center gap-3 hover:border-[#2A2E35]">

      <span
        className="w-4 h-4 rounded-full border flex-shrink-0 flex items-center justify-center"
        style={{ borderColor: active ? '#00E5A0' : '#2A2E35' }}>

        {active && <span className="w-2 h-2 rounded-full bg-mint" />}
      </span>
      <span className="text-[15px] text-ink/90">{label}</span>
    </button>);

}

function ErrorMsg({ show, children }) {
  if (!show) return null;
  return <div className="label-mono text-[10px] text-warn mt-4">{children}</div>;
}

function Card({ title, subtitle, children, id, required }) {
  return (
    <div id={id} className="bg-surface border hairline p-6 md:p-8 scroll-mt-24">
      <div className="label-mono text-[11px] text-mint mb-1" style={{ fontSize: "15px" }}>
        {title}{required && <span aria-hidden="true" className="text-warn ml-1">*</span>}
      </div>
      {subtitle && <div className="text-[14px] text-mute mb-5 mt-2 leading-relaxed">{subtitle}</div>}
      <div className={subtitle ? '' : 'mt-4'}>{children}</div>
    </div>);

}

function Survey() {
  const [name, setName] = useStateS('');
  const [email, setEmail] = useStateS('');
  const [phone, setPhone] = useStateS('');
  const [practice, setPractice] = useStateS('');
  const [practicesOwned, setPracticesOwned] = useStateS('');
  const [bothered, setBothered] = useStateS('');
  const [wishKnew, setWishKnew] = useStateS('');
  const [useful, setUseful] = useStateS(new Set());
  const [noneOf, setNoneOf] = useStateS(false);
  const [mostImportant, setMostImportant] = useStateS(null);
  const [monthlyCost, setMonthlyCost] = useStateS(null);
  const [missing, setMissing] = useStateS('');
  const [pilot, setPilot] = useStateS(null);
  const [submitted, setSubmitted] = useStateS(false);
  const [touched, setTouched] = useStateS(false);

  function toggleUseful(opt) {
    setNoneOf(false);
    setUseful((prev) => {
      const next = new Set(prev);
      if (next.has(opt)) next.delete(opt);else
      next.add(opt);
      return next;
    });
  }

  function toggleNone() {
    setNoneOf((v) => {
      const nv = !v;
      if (nv) setUseful(new Set());
      return nv;
    });
  }

  function firstIncompleteId() {
    if (!name.trim() || !email.trim() || !phone.trim() || !practice.trim() || !practicesOwned) return 'q01';
    if (!bothered.trim()) return 'q02';
    if (!wishKnew.trim()) return 'q03';
    if (useful.size === 0 && !noneOf) return 'q04';
    if (!mostImportant) return 'q05';
    if (!monthlyCost) return 'q07';
    if (!pilot) return 'q08';
    return null;
  }

  function handleSubmit(e) {
    e.preventDefault();
    setTouched(true);
    const firstBad = firstIncompleteId();
    if (firstBad) {
      const el = document.getElementById(firstBad);
      if (el) {
        const top = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top, behavior: 'smooth' });
      }
      return;
    }
    const payload = {
      name, email, phone, practice, practicesOwned,
      bothered,
      wishKnew,
      useful: noneOf ? ['__none__'] : Array.from(useful),
      mostImportant,
      monthlyCost,
      missing,
      pilot,
      ts: new Date().toISOString()
    };
    console.log('[Dentlytics survey response]', payload);
    setSubmitted(true);
  }

  if (submitted) {
    return (
      <div className="bg-surface border hairline px-8 py-14 text-center max-w-[640px] mx-auto">
        <div className="w-2.5 h-2.5 rounded-full bg-mint mint-pulse mx-auto mb-6" aria-hidden="true" />
        <div className="text-[22px] md:text-[26px] h-tight font-semibold mb-3 leading-snug">
          Thanks — we'll be in touch within 5 working days.
        </div>
        <div className="label-mono text-[11px] text-mute mt-6">RESPONSE LOGGED</div>
      </div>);

  }

const FM = window.Motion || window.framerMotion || {};

// In-view reveal — simple IntersectionObserver, no framer dep required
function Reveal({ children, className = '', delay = 0, as: As = 'div' }) {
  const ref = useRefA(null);
  const [shown, setShown] = useStateA(false);
  useEffectA(() => {
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduced) {setShown(true);return;}
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) {setShown(true);io.disconnect();}});
    }, { threshold: 0.12 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return (
    <As
      ref={ref}
      className={className}
      style={{
        opacity: shown ? 1 : 0,
        transform: shown ? 'translateY(0)' : 'translateY(20px)',
        transition: `opacity 600ms ease-out ${delay}ms, transform 600ms ease-out ${delay}ms`
      }}>

      {children}
    </As>);

}
